<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: rgb(173, 170, 170);
        }

        .login-box {
            background: white;
            padding: 30px;
            width: 300px;
            border-radius: 10px;
            /* box-shadow: 0 0 10px gray; */
            text-align: center;
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 10px 0;
        }

        button {
            padding: 10px 20px;
            background: green;
            color: white;
            border: none;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <div class="login-box">
        <h2>Login</h2>
        <input type="text" id="username" placeholder="Enter Username">
        <input type="password" placeholder="Enter Password">
        <a href="dashboard.html"><button onclick="login()"> Login</button></a>
    </div>
    <script>
        function login() {
            let username = document.getElementById("username").value;
            sessionStorage.setItem("username", username);
            window.location.href = "dashboard.html";
        }
    </script>
</body>

</html>
